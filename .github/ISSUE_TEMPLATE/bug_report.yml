name: Bug report
description: Report a problem with MinerUI Portable
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please attach `logs/mineru-desktop.log` when possible.
  - type: input
    id: version
    attributes:
      label: MinerUI Portable version
      placeholder: v1.0.0
    validations:
      required: true
  - type: dropdown
    id: stage
    attributes:
      label: When did the problem happen?
      options:
        - First launch / installation
        - Starting MinerU after installation
        - Downloading Torch or dependencies
        - Downloading models
        - Opening the WebUI
        - Converting a document
        - Cleanup / deletion
        - Building from source
        - Other
    validations:
      required: true
  - type: dropdown
    id: backend
    attributes:
      label: Torch backend
      options:
        - CUDA auto
        - CUDA 12.6
        - CUDA 12.8
        - CPU
        - Not sure
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: Windows 11 23H2 / Windows 10 22H2
    validations:
      required: true
  - type: input
    id: gpu
    attributes:
      label: GPU
      placeholder: NVIDIA RTX 3060 / none / unknown
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: What did you do before the problem happened?
      placeholder: |
        1. Extracted the zip to ...
        2. Started MinerUI Portable.exe
        3. Selected ...
        4. Pressed ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: log
    attributes:
      label: Relevant log output
      description: Paste the relevant part of logs/mineru-desktop.log or attach the file to the issue.
      render: text
